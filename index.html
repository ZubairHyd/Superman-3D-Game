<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero 3D Flight</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Impact', 'Arial Black', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            color: white;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            font-size: 28px;
            letter-spacing: 2px;
        }
        #health-bar-container {
            width: 300px;
            height: 30px;
            background: rgba(0,0,0,0.5);
            border: 3px solid #fff;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        #health-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ffcc00);
            transition: width 0.2s ease-out;
        }
        .hud-bottom {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.7);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }
        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 15, 40, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 20;
            backdrop-filter: blur(5px);
        }
        #title {
            font-size: 80px;
            color: #e20025;
            text-transform: uppercase;
            text-shadow: 0 0 20px #e20025, 4px 4px 0 #ffe600;
            margin: 0 0 20px 0;
            transform: skew(-10deg);
        }
        #start-btn {
            padding: 15px 40px;
            font-size: 30px;
            background: #ffe600;
            color: #0033a0;
            border: 4px solid #e20025;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 10px 0 #ccb800;
        }
        #start-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #ccb800;
        }
        .hidden {
            display: none !important;
        }
        #damage-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,255,0,0) 50%, rgba(0,255,0,0.4) 100%);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.1s;
        }
    </style>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="damage-overlay"></div>

    <div id="ui-layer">
        <div class="hud-top">
            <div id="score-display">SCORE: 0</div>
            <div>
                HEALTH
                <div id="health-bar-container">
                    <div id="health-bar"></div>
                </div>
            </div>
        </div>
        <div class="hud-bottom">
            MOUSE to Steer | CLICK or SPACE to use Heat Vision
        </div>
    </div>

    <div id="menu-overlay">
        <h1 id="title">MAN OF STEEL 3D</h1>
        <p style="color: white; font-family: sans-serif; font-size: 18px; margin-bottom: 30px; text-align: center; max-width: 500px;">
            Fly through Metropolis. Dodge the Kryptonite meteors.<br>Destroy them with your Heat Vision!
        </p>
        <button id="start-btn">FLY NOW</button>
    </div>

    <script>
        // ==========================================
        // 1. PROCEDURAL AUDIO & VOICE ENGINE
        // ==========================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let musicPlaying = false;
        let bgmOscillators = [];

        // Synthesize heroic background music
        function playHeroicMusic() {
            if (musicPlaying) return;
            musicPlaying = true;
            
            const melody = [
                261.63, // C4
                329.63, // E4
                392.00, // G4
                523.25, // C5
            ];
            
            let noteIndex = 0;
            
            function playNextNote() {
                if (!musicPlaying) return;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'square';
                osc.frequency.value = melody[noteIndex % melody.length] / 2; // Bass line
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                // Envelope
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.2);
                
                bgmOscillators.push(osc);
                
                noteIndex++;
                if (noteIndex % 8 === 0) {
                    // Change chord slightly every 8 notes
                    melody[1] = melody[1] === 329.63 ? 349.23 : 329.63; // Toggle E/F
                }
                
                setTimeout(playNextNote, 200);
            }
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            playNextNote();
        }

        function stopMusic() {
            musicPlaying = false;
            bgmOscillators.forEach(osc => {
                try { osc.stop(); } catch(e){}
            });
            bgmOscillators = [];
        }

        // Sound Effects
        function playLaserSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playExplosionSound() {
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // White noise
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            // Filter noise to sound like explosion
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            noise.start(audioCtx.currentTime);
        }

        function playDamageSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.4);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // Voice Engine
        function speak(text, priority = false) {
            if (!window.speechSynthesis) return;
            if (priority) window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 0.8; // Deep, heroic voice
            utterance.rate = 1.1;
            utterance.volume = 1.0;
            
            // Try to find a male English voice
            const voices = window.speechSynthesis.getVoices();
            const maleVoice = voices.find(v => v.name.includes('Male') || v.name.includes('David') || v.name.includes('Mark'));
            if (maleVoice) utterance.voice = maleVoice;
            
            window.speechSynthesis.speak(utterance);
        }

        // Ensure voices are loaded
        window.speechSynthesis.onvoiceschanged = () => {};


        // ==========================================
        // 2. 3D GAME ENGINE (THREE.JS)
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x5ca8d6);
        scene.fog = new THREE.FogExp2(0x5ca8d6, 0.003);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 100;
        dirLight.shadow.camera.bottom = -100;
        dirLight.shadow.camera.left = -100;
        dirLight.shadow.camera.right = 100;
        scene.add(dirLight);

        // --- Build Hero (Procedural Superman Model) ---
        const heroGroup = new THREE.Group();
        scene.add(heroGroup);
        heroGroup.position.set(0, 5, 0);

        const heroMatBlue = new THREE.MeshStandardMaterial({ color: 0x0033a0, roughness: 0.4 });
        const heroMatRed = new THREE.MeshStandardMaterial({ color: 0xe20025, roughness: 0.4 });
        const heroMatYellow = new THREE.MeshStandardMaterial({ color: 0xffe600, roughness: 0.2 });
        const heroMatSkin = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.6 });

        // Torso
        const torsoGeo = new THREE.BoxGeometry(1.2, 1.8, 0.6);
        const torso = new THREE.Mesh(torsoGeo, heroMatBlue);
        torso.castShadow = true;
        heroGroup.add(torso);

        // Logo (Yellow diamond on chest)
        const logoGeo = new THREE.BoxGeometry(0.6, 0.5, 0.1);
        const logo = new THREE.Mesh(logoGeo, heroMatYellow);
        logo.position.set(0, 0.4, 0.31);
        logo.rotation.z = Math.PI / 4;
        heroGroup.add(logo);

        // Head
        const headGeo = new THREE.BoxGeometry(0.7, 0.8, 0.7);
        const head = new THREE.Mesh(headGeo, heroMatSkin);
        head.position.set(0, 1.4, 0);
        head.castShadow = true;
        heroGroup.add(head);

        // Hair (Black box on top)
        const hairGeo = new THREE.BoxGeometry(0.75, 0.2, 0.75);
        const hair = new THREE.Mesh(hairGeo, new THREE.MeshStandardMaterial({ color: 0x111111 }));
        hair.position.set(0, 1.8, 0);
        heroGroup.add(hair);

        // Arms (Flying pose, stretched forward)
        const armGeo = new THREE.BoxGeometry(0.4, 0.4, 1.8);
        const armL = new THREE.Mesh(armGeo, heroMatBlue);
        armL.position.set(-0.8, 0.7, -0.6);
        const armR = new THREE.Mesh(armGeo, heroMatBlue);
        armR.position.set(0.8, 0.7, -0.6);
        heroGroup.add(armL, armR);
        
        // Hands
        const handGeo = new THREE.BoxGeometry(0.35, 0.35, 0.4);
        const handL = new THREE.Mesh(handGeo, heroMatSkin);
        handL.position.set(-0.8, 0.7, -1.6);
        const handR = new THREE.Mesh(handGeo, heroMatSkin);
        handR.position.set(0.8, 0.7, -1.6);
        heroGroup.add(handL, handR);

        // Legs (Trailing behind)
        const legGeo = new THREE.BoxGeometry(0.45, 1.5, 0.45);
        const legL = new THREE.Mesh(legGeo, heroMatBlue);
        legL.position.set(-0.3, -1.5, 0.2);
        legL.rotation.x = -Math.PI / 8; // Slanted back
        const legR = new THREE.Mesh(legGeo, heroMatBlue);
        legR.position.set(0.3, -1.5, 0.2);
        legR.rotation.x = -Math.PI / 8;
        heroGroup.add(legL, legR);

        // Boots
        const bootGeo = new THREE.BoxGeometry(0.5, 0.8, 0.5);
        const bootL = new THREE.Mesh(bootGeo, heroMatRed);
        bootL.position.set(-0.3, -2.5, 0.6);
        bootL.rotation.x = -Math.PI / 8;
        const bootR = new THREE.Mesh(bootGeo, heroMatRed);
        bootR.position.set(0.3, -2.5, 0.6);
        bootR.rotation.x = -Math.PI / 8;
        heroGroup.add(bootL, bootR);

        // Cape (Animated in render loop)
        const capeGeo = new THREE.PlaneGeometry(1.5, 3.5, 5, 5);
        const capeMat = new THREE.MeshStandardMaterial({ color: 0xe20025, side: THREE.DoubleSide });
        const cape = new THREE.Mesh(capeGeo, capeMat);
        cape.position.set(0, -0.5, 0.4);
        // Rotate cape to flow backwards
        cape.rotation.x = -Math.PI / 3;
        heroGroup.add(cape);

        // --- Environment Generator (City & Clouds) ---
        const worldObjects = new THREE.Group();
        scene.add(worldObjects);

        const buildings = [];
        const buildingMat = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.8 });
        
        for (let i = 0; i < 60; i++) {
            const h = Math.random() * 40 + 10;
            const geo = new THREE.BoxGeometry(5 + Math.random() * 5, h, 5 + Math.random() * 5);
            const mesh = new THREE.Mesh(geo, buildingMat);
            
            // Distribute along Z and push outward on X so hero flies down an avenue
            const z = -Math.random() * 400;
            const x = (Math.random() > 0.5 ? 1 : -1) * (15 + Math.random() * 40);
            
            mesh.position.set(x, h/2 - 10, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            worldObjects.add(mesh);
            buildings.push(mesh);
        }

        // --- Obstacles (Kryptonite) ---
        const meteors = [];
        const meteorGeo = new THREE.DodecahedronGeometry(2, 0);
        const meteorMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ff00, 
            emissive: 0x00aa00,
            emissiveIntensity: 0.5,
            roughness: 0.2, 
            metalness: 0.8 
        });

        // Add a green point light to meteors for glow effect
        function spawnMeteor() {
            const mesh = new THREE.Mesh(meteorGeo, meteorMat);
            const z = -300 - Math.random() * 100;
            const x = (Math.random() - 0.5) * 40;
            const y = Math.random() * 20 + 2;
            
            mesh.position.set(x, y, z);
            
            // Random rotation speed
            mesh.userData.rotX = Math.random() * 0.05;
            mesh.userData.rotY = Math.random() * 0.05;
            
            const light = new THREE.PointLight(0x00ff00, 1, 15);
            mesh.add(light);
            
            worldObjects.add(mesh);
            meteors.push(mesh);
        }

        for (let i=0; i<10; i++) spawnMeteor();

        // --- Lasers (Heat Vision) ---
        const lasers = [];
        const laserGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 8);
        laserGeo.rotateX(Math.PI / 2); // Point forward
        const laserMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        function fireLaser() {
            if (!isPlaying || health <= 0) return;
            
            playLaserSound();
            
            // Fire from eyes
            const l1 = new THREE.Mesh(laserGeo, laserMat);
            l1.position.copy(heroGroup.position);
            l1.position.x -= 0.2;
            l1.position.y += 1.4; // Eye level
            
            const l2 = new THREE.Mesh(laserGeo, laserMat);
            l2.position.copy(heroGroup.position);
            l2.position.x += 0.2;
            l2.position.y += 1.4;

            scene.add(l1, l2);
            lasers.push(l1, l2);

            // 10% chance to say "Heat vision!"
            if (Math.random() < 0.1) speak("Heat vision!");
        }

        // --- Explosion Particles ---
        const particles = [];
        const particleGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
        function createExplosion(position) {
            playExplosionSound();
            for(let i=0; i<15; i++) {
                const p = new THREE.Mesh(particleGeo, meteorMat);
                p.position.copy(position);
                p.userData = {
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5,
                    vz: (Math.random() - 0.5) * 1.5 + flightSpeed, // inherit flight speed
                    life: 1.0
                };
                scene.add(p);
                particles.push(p);
            }
        }


        // ==========================================
        // 3. GAME LOGIC & CONTROLS
        // ==========================================
        let isPlaying = false;
        let score = 0;
        let health = 100;
        const flightSpeed = 1.5; // Z-axis speed

        // Target positions for smooth mouse following
        const targetPos = new THREE.Vector3(0, 5, 0);
        
        // Input handling
        window.addEventListener('mousemove', (e) => {
            if (!isPlaying) return;
            // Map mouse to world coordinates roughly
            const nx = (e.clientX / window.innerWidth) * 2 - 1;
            const ny = -(e.clientY / window.innerHeight) * 2 + 1;
            
            targetPos.x = nx * 20;
            targetPos.y = Math.max(1, ny * 15 + 10); // Keep above ground
        });

        window.addEventListener('mousedown', fireLaser);
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') fireLaser();
        });

        // UI Updates
        const scoreUI = document.getElementById('score-display');
        const healthBar = document.getElementById('health-bar');
        const menuOverlay = document.getElementById('menu-overlay');
        const titleText = document.getElementById('title');
        const startBtn = document.getElementById('start-btn');
        const damageOverlay = document.getElementById('damage-overlay');

        function updateHUD() {
            scoreUI.innerText = `SCORE: ${Math.floor(score)}`;
            healthBar.style.width = `${Math.max(0, health)}%`;
        }

        function takeDamage() {
            health -= 25;
            updateHUD();
            playDamageSound();
            
            // Red flash effect
            damageOverlay.style.opacity = '1';
            setTimeout(() => { damageOverlay.style.opacity = '0'; }, 200);

            // Dynamic voice line
            const hitLines = ["Ouch!", "Kryptonite!", "Argh!", "My strength..."];
            speak(hitLines[Math.floor(Math.random() * hitLines.length)], true);

            if (health <= 0) {
                gameOver();
            }
        }

        function gameOver() {
            isPlaying = false;
            stopMusic();
            speak("I failed Metropolis.", true);
            titleText.innerText = "GAME OVER";
            startBtn.innerText = "TRY AGAIN";
            menuOverlay.classList.remove('hidden');
        }

        function startGame() {
            // Reset state
            health = 100;
            score = 0;
            heroGroup.position.set(0, 5, 0);
            targetPos.set(0, 5, 0);
            updateHUD();
            
            // Clear existing meteors to push them back
            meteors.forEach(m => {
                m.position.z = -300 - Math.random() * 200;
            });

            menuOverlay.classList.add('hidden');
            isPlaying = true;

            // Audio setup requires gesture
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            playHeroicMusic();
            speak("Up, up, and away!", true);
        }

        startBtn.addEventListener('click', startGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });


        // ==========================================
        // 4. ANIMATION LOOP
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (isPlaying) {
                // Smooth interpolation for hero movement
                heroGroup.position.x += (targetPos.x - heroGroup.position.x) * 0.1;
                heroGroup.position.y += (targetPos.y - heroGroup.position.y) * 0.1;
                
                // Banking effect (tilt when moving sideways)
                const velocityX = (targetPos.x - heroGroup.position.x);
                heroGroup.rotation.z = -velocityX * 0.05;
                
                // Flight bobbing
                heroGroup.position.y += Math.sin(time * 5) * 0.02;

                // Animate Cape (vertex manipulation)
                const positionAttribute = cape.geometry.getAttribute('position');
                for (let i = 0; i < positionAttribute.count; i++) {
                    const u = cape.geometry.attributes.uv.getX(i);
                    const v = cape.geometry.attributes.uv.getY(i);
                    // The bottom of the cape flutters more
                    const wave = Math.sin(v * 10 - time * 15) * (1 - v) * 0.4;
                    positionAttribute.setZ(i, wave);
                }
                cape.geometry.computeVertexNormals();
                cape.geometry.attributes.position.needsUpdate = true;

                // Move Environment (Creates illusion of flight forward)
                buildings.forEach(b => {
                    b.position.z += flightSpeed;
                    if (b.position.z > 50) {
                        b.position.z -= 400; // Recycle to back
                    }
                });

                // Move & Spin Meteors
                meteors.forEach(m => {
                    m.position.z += flightSpeed * 1.5; // Meteors move faster than buildings
                    m.rotation.x += m.userData.rotX;
                    m.rotation.y += m.userData.rotY;

                    // Collision with hero
                    const dist = m.position.distanceTo(heroGroup.position);
                    if (dist < 3.0) {
                        takeDamage();
                        createExplosion(m.position);
                        // Respawn meteor far away
                        m.position.z = -300 - Math.random() * 200;
                        m.position.x = (Math.random() - 0.5) * 40;
                    }

                    // Missed meteor / Recycle
                    if (m.position.z > 20) {
                        m.position.z = -300 - Math.random() * 200;
                        m.position.x = (Math.random() - 0.5) * 40;
                    }
                });

                // Move Lasers & Check Meteor Hits
                for (let i = lasers.length - 1; i >= 0; i--) {
                    const l = lasers[i];
                    l.position.z -= 3; // Move forward very fast

                    let hit = false;
                    for (let j = 0; j < meteors.length; j++) {
                        const m = meteors[j];
                        if (l.position.distanceTo(m.position) < 2.5) {
                            hit = true;
                            score += 100;
                            createExplosion(m.position);
                            // Respawn meteor
                            m.position.z = -300 - Math.random() * 200;
                            m.position.x = (Math.random() - 0.5) * 40;
                            break;
                        }
                    }

                    // Remove laser if it hits or goes too far
                    if (hit || l.position.z < -200) {
                        scene.remove(l);
                        lasers.splice(i, 1);
                    }
                }

                // Update score over time
                score += delta * 10;
                updateHUD();
            }

            // Update explosion particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.x += p.userData.vx;
                p.position.y += p.userData.vy;
                p.position.z += p.userData.vz;
                p.userData.life -= delta * 2;
                p.scale.setScalar(p.userData.life);
                
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }

            // Make camera lag slightly behind hero for dynamic feel
            camera.position.x += (heroGroup.position.x * 0.3 - camera.position.x) * 0.1;
            camera.position.y += ((heroGroup.position.y + 4) - camera.position.y) * 0.1;
            camera.lookAt(heroGroup.position.x * 0.5, heroGroup.position.y, heroGroup.position.z - 20);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
